<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="가계부">
<title>가계부</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
:root {
  --bg:#F7F5F0; --card:#FFFFFF; --border:#E8E2D9;
  --ink:#1C1917; --ink2:#6B6560; --ink3:#A8A39D;
  --green:#2D6A4F; --green-l:#D8EEE5;
  --red:#C0392B; --red-l:#FDECEA;
  --gold:#B8860B; --gold-l:#FFF8E7;
  --blue:#1B4F72; --blue-l:#D6EAF8;
  --purple:#6C3483; --purple-l:#F5EEF8;
  --orange:#CA6F1E; --orange-l:#FDEBD0;
  --teal:#117A65; --teal-l:#D1F2EB;
  --rose:#922B21; --rose-l:#FADBD8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

.header{background:var(--ink);padding:16px 20px 12px;color:white;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.header-title{font-family:'Playfair Display',serif;font-size:20px;letter-spacing:.02em;}
.header-title em{font-style:italic;color:#C9A84C;}
.header-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.1em;margin-top:1px;}
.hbtns{display:flex;gap:6px;}
.hbtn{background:rgba(255,255,255,.12);border:none;color:white;font-size:10px;padding:5px 9px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border-radius:2px;transition:background .2s;}
.hbtn:hover{background:rgba(255,255,255,.22);}

.nav{display:flex;background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:53px;z-index:40;}
.nav-btn{flex:1;padding:11px 2px;background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:500;color:var(--ink2);transition:all .2s;position:relative;letter-spacing:.02em;}
.nav-btn.active{color:var(--ink);font-weight:700;}
.nav-btn.active::after{content:'';position:absolute;bottom:-2px;left:10%;right:10%;height:2px;background:var(--ink);}

.page{display:none;padding:14px;width:100%;box-sizing:border-box;}
.page.active{display:block;}
.mw{max-width:480px;margin:0 auto;width:100%;min-width:0;}

/* Month nav */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mnav-btn{background:none;border:1px solid var(--border);width:30px;height:30px;cursor:pointer;color:var(--ink2);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.mnav-btn:hover{background:var(--ink);color:white;border-color:var(--ink);}
.mlabel{font-family:'Playfair Display',serif;font-size:17px;color:var(--ink);}

/* Budget overview */
.bov{background:var(--ink);color:white;padding:16px;margin-bottom:10px;border-radius:2px;}
.bov-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px;}
.bov-main{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.bov-remain{font-family:'Playfair Display',serif;font-size:26px;}
.bov-remain.good{color:#6BCB77;} .bov-remain.warn{color:#FFD93D;} .bov-remain.danger{color:#FF6B6B;}
.bov-info{font-size:10px;color:rgba(255,255,255,.45);text-align:right;line-height:1.8;}
.bar-bg{height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s;}
.bar-fill.good{background:#6BCB77;} .bar-fill.warn{background:#FFD93D;} .bar-fill.danger{background:#FF6B6B;}
.bar-pct{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;text-align:right;}

/* Cat remain cards */
.cat-remains{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.cat-remain-card{background:var(--card);border:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:10px;}
.cr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cr-body{flex:1;min-width:0;}
.cr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.cr-name{font-size:12px;font-weight:600;color:var(--ink);}
.cr-remain{font-size:12px;font-weight:700;}
.cr-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.cr-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.cr-sub{font-size:10px;color:var(--ink3);margin-top:3px;text-align:right;}

/* Calendar */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.cal-dl{text-align:center;font-size:10px;font-weight:700;color:var(--ink3);padding:3px 0;}
.cal-dl:first-child{color:var(--red);} .cal-dl:last-child{color:var(--blue);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{min-height:50px;background:var(--card);border:1px solid var(--border);padding:3px;cursor:pointer;transition:border-color .15s;position:relative;}
.cal-cell:hover{border-color:var(--ink);}
.cal-cell.today{border:2px solid var(--ink);}
.cal-cell.other{background:var(--bg);opacity:.45;}
.cal-cell.sel{background:#FFF8E7;border-color:var(--gold);}
.cdate{font-size:10px;font-weight:600;color:var(--ink2);margin-bottom:1px;}
.cdate.sun{color:var(--red);} .cdate.sat{color:var(--blue);}
.cal-cell.today .cdate{color:white;background:var(--ink);width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;}
.cdots{display:flex;flex-wrap:wrap;gap:1px;margin-top:1px;}
.cdot{width:5px;height:5px;border-radius:50%;}
.camt{font-size:8px;color:var(--ink2);margin-top:1px;font-weight:600;}

/* Day detail */
.day-detail{margin-top:10px;}
.dd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dd-title{font-size:13px;font-weight:700;}
.btn-add{padding:7px 14px;background:var(--ink);color:white;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}

/* TX items */
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);margin-bottom:3px;}
.tx-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tx-body{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:500;}
.tx-cat{font-size:10px;color:var(--ink3);margin-top:1px;}
.tx-amt{font-size:14px;font-weight:700;color:var(--red);}
.tx-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:12px;padding:4px;transition:color .2s;}
.tx-del:hover{color:var(--red);}

/* Food tab */
.food-section{margin-bottom:14px;}
.food-sec-title{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--ink2);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.food-sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

.week-card{background:var(--card);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.wc-header{padding:13px 14px;border-bottom:1px solid var(--border);}
.wc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.wc-title{font-size:12px;font-weight:700;color:var(--ink);}
.wc-dates{font-size:10px;color:var(--ink3);font-weight:400;margin-left:6px;}
.wc-remain{font-family:'Playfair Display',serif;font-size:16px;}
.wc-remain.good{color:var(--green);} .wc-remain.warn{color:var(--gold);} .wc-remain.danger{color:var(--red);}
.wc-budget-row{display:flex;align-items:center;gap:8px;}
.wc-budget-label{font-size:10px;color:var(--ink3);white-space:nowrap;}
.wc-budget-input{width:110px;padding:5px 8px;border:1px solid var(--border);background:var(--bg);font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--ink);outline:none;}
.wc-budget-input:focus{border-color:var(--ink);}
.wc-bar-wrap{padding:12px 14px;}
.wc-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.wc-bar-row:last-child{margin-bottom:0;}
.wc-bar-label{font-size:11px;color:var(--ink2);min-width:50px;font-weight:600;}
.wc-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.wc-bar-fill{height:100%;border-radius:3px;}
.wc-bar-val{font-size:10px;color:var(--ink2);min-width:55px;text-align:right;}

/* List tab */
.cat-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.tx-group{margin-bottom:14px;}
.txg-date{font-size:11px;font-weight:700;color:var(--ink2);padding:7px 0 5px;border-bottom:1px solid var(--border);margin-bottom:5px;display:flex;justify-content:space-between;}
.txg-total{color:var(--red);font-weight:700;}

/* Event tab */
.ev-section{background:var(--card);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.ev-sec-title{padding:11px 14px;font-size:12px;font-weight:700;color:var(--ink);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.ev-total{font-family:'Playfair Display',serif;font-size:15px;color:var(--red);}
.ev-list{padding:0 14px 8px;}

/* Settings */
.set-section{background:var(--card);border:1px solid var(--border);margin-bottom:10px;min-width:0;box-sizing:border-box;}
.set-title{padding:11px 14px;font-size:12px;font-weight:700;color:var(--ink);border-bottom:1px solid var(--border);}
.set-body{padding:12px 14px;min-width:0;box-sizing:border-box;}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.set-row:last-child{margin-bottom:0;}
.set-input{flex:1;padding:8px 10px;border:1px solid var(--border);background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--ink);outline:none;}
.set-input:focus{border-color:var(--ink);}
.btn-set{padding:8px 13px;background:var(--ink);color:white;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;white-space:nowrap;}
.btn-set:hover{opacity:.8;}
.btn-set.red{background:var(--red);}
.cat-mi{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.cat-mi:last-child{border-bottom:none;}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,25,23,.65);z-index:100;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--card);width:100%;max-width:480px;padding:22px 18px;border-top:3px solid var(--ink);max-height:85vh;overflow-y:auto;}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--ink);margin-bottom:18px;}
.flabel{font-size:10px;font-weight:700;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;margin-top:13px;display:block;}
.finput{width:100%;padding:10px 11px;border:1px solid var(--border);background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--ink);outline:none;}
.finput:focus{border-color:var(--ink);}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:5px;}
.cat-sel-btn{padding:8px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;color:var(--ink2);transition:all .2s;text-align:center;border-radius:2px;}
.cat-sel-btn.sel{color:white;border-color:transparent;}
.mbtns{display:flex;gap:8px;margin-top:18px;}
.btn-primary{flex:1;padding:12px;background:var(--ink);color:white;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;}
.btn-primary:hover{opacity:.85;}
.btn-cancel{padding:12px 18px;background:none;color:var(--ink2);border:1px solid var(--border);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;}
.type-toggle{display:flex;gap:6px;margin-top:5px;}
.type-btn{flex:1;padding:9px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;color:var(--ink2);transition:all .2s;text-align:center;}
.type-btn.sel{background:var(--ink);color:white;border-color:var(--ink);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:white;padding:10px 20px;font-size:12px;opacity:0;transition:all .3s;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:28px 16px;color:var(--ink3);font-size:12px;line-height:2;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- 로딩 화면 -->
<div id="loadingScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#F7F5F0;">
  <div style="font-family:'Playfair Display',serif;font-size:28px;color:#1C1917;margin-bottom:16px;">💰 가계<em style="font-style:italic;color:#B8860B;">부</em></div>
  <div style="font-size:12px;color:#A8A39D;">잠시만요...</div>
</div>

<!-- 로그인 화면 -->
<div id="loginScreen" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#F7F5F0;padding:40px 20px;">
  <div style="text-align:center;max-width:320px;width:100%;">
    <div style="font-family:'Playfair Display',serif;font-size:28px;color:#1C1917;margin-bottom:6px;">💰 가계<em style="font-style:italic;color:#B8860B;">부</em></div>
    <div style="font-size:11px;color:#B8860B;letter-spacing:.15em;margin-bottom:40px;">by @rich_magnets</div>
    <p style="font-size:13px;color:#6B6560;margin-bottom:30px;line-height:1.6;">로그인하면 어떤 기기에서든<br>데이터가 안전하게 동기화돼요</p>
    <button onclick="loginWithGoogle()" style="width:100%;padding:14px;background:white;border:1px solid #E8E2D9;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#1C1917;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20">
      Google로 로그인
    </button>
  </div>
</div>

<!-- 앱 본체 -->
<div id="appContainer" style="display:none;">

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">가계<em>부</em></div>
      <div class="header-sub">BUDGET NOTE</div>
      <div style="font-size:10px;color:rgba(201,168,76,.7);letter-spacing:.06em;margin-top:2px;">by @rich_magnets</div>
    </div>
    <div class="hbtns">
      <button class="hbtn" onclick="exportData()">📤 백업</button>
      <button class="hbtn" onclick="document.getElementById('importInput').click()">📥 가져오기</button>
      <button class="hbtn" onclick="logout()" style="color:rgba(255,100,100,.8);">로그아웃</button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('cal',this)">📅 달력</button>
  <button class="nav-btn" onclick="switchTab('food',this)">🍚 식비</button>
  <button class="nav-btn" onclick="switchTab('event',this)">🎯 이벤트</button>
  <button class="nav-btn" onclick="switchTab('list',this)">📋 내역</button>
  <button class="nav-btn" onclick="switchTab('setting',this)">⚙️ 설정</button>
</nav>

<!-- 달력 탭 -->
<div id="calPage" class="page active">
  <div class="mw">
    <div class="mnav">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="mlabel" id="monthLabel"></div>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div id="budgetOverview"></div>
    <div id="catRemains"></div>
    <div class="cal-header">
      <div class="cal-dl">일</div><div class="cal-dl">월</div><div class="cal-dl">화</div>
      <div class="cal-dl">수</div><div class="cal-dl">목</div><div class="cal-dl">금</div><div class="cal-dl">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="day-detail" id="dayDetail"></div>
  </div>
</div>

<!-- 식비 탭 -->
<div id="foodPage" class="page">
  <div class="mw">
    <div class="mnav">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="mlabel" id="monthLabel2"></div>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div id="foodSummary"></div>
    <div id="foodWeeks"></div>
  </div>
</div>

<!-- 이벤트 탭 -->
<div id="eventPage" class="page">
  <div class="mw">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:16px;">이벤트 지출</div>
        <div style="font-size:10px;color:var(--ink2);margin-top:2px;" id="eventYearLabel"></div>
      </div>
      <button class="btn-add" onclick="openEventModal()">+ 추가</button>
    </div>
    <div class="ev-section">
      <div class="ev-sec-title"><span>📅 연간비</span><span class="ev-total" id="annualTotal"></span></div>
      <div class="ev-list" id="annualList"></div>
    </div>
    <div class="ev-section">
      <div class="ev-sec-title"><span>🚨 비상금</span><span class="ev-total" id="emergencyTotal"></span></div>
      <div class="ev-list" id="emergencyList"></div>
    </div>
  </div>
</div>

<!-- 내역 탭 -->
<div id="listPage" class="page">
  <div class="mw">
    <div class="mnav">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="mlabel" id="monthLabel3"></div>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cat-chips" id="filterChips"></div>
    <div id="txList"></div>
  </div>
</div>

<!-- 설정 탭 -->
<div id="settingPage" class="page">
  <div class="mw">
    <div class="set-section">
      <div class="set-title">💰 월 예산 설정</div>
      <div class="set-body">
        <div style="font-size:11px;color:var(--ink2);margin-bottom:8px;">월 전체 예산을 설정하세요</div>
        <div class="set-row">
          <input type="number" class="set-input" id="monthBudgetInput" placeholder="예: 1500000">
          <button class="btn-set" onclick="saveMonthBudget()">저장</button>
        </div>
        <div id="monthBudgetDisplay" style="font-size:11px;color:var(--ink2);margin-top:2px;"></div>
      </div>
    </div>
    <div class="set-section">
      <div class="set-title">🍚 식비 카테고리</div>
      <div class="set-body">
        <div style="font-size:11px;color:var(--ink2);margin-bottom:8px;">식비 탭에서 추적할 카테고리를 지정하세요</div>
        <div id="foodCatSelect"></div>
      </div>
    </div>
    <div class="set-section">
      <div class="set-title">🏷️ 카테고리 관리</div>
      <div class="set-body">
        <div style="display:flex;gap:6px;margin-bottom:8px;min-width:0;width:100%;box-sizing:border-box;">
          <input type="text" class="set-input" id="catNameInput" placeholder="카테고리 이름" style="flex:1;min-width:0;width:0;box-sizing:border-box;">
          <div style="position:relative;width:40px;height:34px;flex-shrink:0;">
            <div id="catColorDot" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:#2D6A4F;pointer-events:none;"></div>
            <div style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:7px;color:var(--ink3);pointer-events:none;">▼</div>
            <select id="catColorInput" onchange="document.getElementById('catColorDot').style.background=this.value"

// ── HELPERS ──
function getMonthTx(y,m){
  const prefix=`${y}-${String(m+1).padStart(2,'0')}`;
  return data.transactions.filter(t=>t.date.startsWith(prefix));
}
function getMonthTotal(y,m){return getMonthTx(y,m).reduce((s,t)=>s+t.amount,0);}

function getWeeksOfMonth(y,m){
  const weeks=[];
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  let ws=new Date(first);
  const dow=first.getDay();
  ws.setDate(first.getDate()-(dow===0?6:dow-1));
  while(ws<=last){
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    weeks.push({
      start:new Date(Math.max(ws,first)),
      end:new Date(Math.min(we,last))
    });
    ws.setDate(ws.getDate()+7);
  }
  return weeks;
}

function getWeekTx(week){
  const sk=dateKey(week.start.getFullYear(),week.start.getMonth(),week.start.getDate());
  const ek=dateKey(week.end.getFullYear(),week.end.getMonth(),week.end.getDate());
  return data.transactions.filter(t=>t.date>=sk&&t.date<=ek);
}

function getWeekBudget(wi){
  const key=`${curYear}-${String(curMonth+1).padStart(2,'0')}-w${wi}`;
  return data.weekBudgets[key]||0;
}

function saveWeekBudget(wi,val){
  const key=`${curYear}-${String(curMonth+1).padStart(2,'0')}-w${wi}`;
  const v=parseInt(val);
  if(!isNaN(v)&&v>=0){data.weekBudgets[key]=v;save();renderFood();}
}

// ── CALENDAR ──
function renderCal(){
  const lbl=`${curYear}년 ${curMonth+1}월`;
  document.getElementById('monthLabel').textContent=lbl;

  // 월 예산 overview
  const total=getMonthTotal(curYear,curMonth);
  const budget=data.monthBudget;
  const remain=budget-total;
  const pct=budget>0?Math.min(Math.round(total/budget*100),100):0;
  const st=budget===0?'good':pct>=90?'danger':pct>=70?'warn':'good';

  document.getElementById('budgetOverview').innerHTML=`
    <div class="bov">
      <div class="bov-title">${curMonth+1}월 예산 현황</div>
      <div class="bov-main">
        <div>
          <div style="font-size:10px;color:rgba(255,255,255,.45);margin-bottom:3px;">남은 예산</div>
          <div class="bov-remain ${st}">${budget>0?fmt(remain):'예산 미설정'}</div>
        </div>
        <div class="bov-info">
          <div>지출 ${fmt(total)}</div>
          <div>예산 ${budget>0?fmt(budget):'-'}</div>
        </div>
      </div>
      ${budget>0?`<div class="bar-bg"><div class="bar-fill ${st}" style="width:${pct}%"></div></div><div class="bar-pct">${pct}% 사용</div>`:''}
    </div>`;

  // 카테고리별 잔액 (예산 설정된 것만)
  const monthTxs=getMonthTx(curYear,curMonth);
  const catCards=data.categories.filter(c=>c.budget>0).map(c=>{
    const spent=monthTxs.filter(t=>t.catId===c.id).reduce((s,t)=>s+t.amount,0);
    const rem=c.budget-spent;
    const p=Math.min(Math.round(spent/c.budget*100),100);
    const bc=p>=90?'#FF6B6B':p>=70?'#FFD93D':c.color;
    return `<div class="cat-remain-card">
      <div class="cr-dot" style="background:${c.color}"></div>
      <div class="cr-body">
        <div class="cr-top">
          <span class="cr-name">${c.name}</span>
          <span class="cr-remain" style="color:${rem>=0?c.color:'var(--red)'};">${rem>=0?'남은 '+fmt(rem):'초과 '+fmt(Math.abs(rem))}</span>
        </div>
        <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:${p}%;background:${bc};"></div></div>
        <div class="cr-sub">${fmt(spent)} / ${fmt(c.budget)}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('catRemains').innerHTML=catCards
    ?`<div class="cat-remains">${catCards}</div>`:'';

  // 달력 그리드
  const first=new Date(curYear,curMonth,1);
  const lastDay=new Date(curYear,curMonth+1,0).getDate();
  const startDow=first.getDay();
  const tk=todayKey();
  const txByDate={};
  monthTxs.forEach(t=>{if(!txByDate[t.date])txByDate[t.date]=[];txByDate[t.date].push(t);});

  let cells='';
  const prevLast=new Date(curYear,curMonth,0).getDate();
  for(let i=startDow-1;i>=0;i--) cells+=`<div class="cal-cell other"><div class="cdate">${prevLast-i}</div></div>`;

  for(let d=1;d<=lastDay;d++){
    const key=dateKey(curYear,curMonth,d);
    const dow=new Date(curYear,curMonth,d).getDay();
    const isToday=key===tk;
    const isSel=key===selectedDate;
    const dayTx=txByDate[key]||[];
    const dayTotal=dayTx.reduce((s,t)=>s+t.amount,0);
    const dateEl=isToday
      ?`<div class="cdate">${d}</div>`
      :`<div class="cdate ${dow===0?'sun':dow===6?'sat':''}">${d}</div>`;
    const dots=dayTx.slice(0,4).map(t=>`<div class="cdot" style="background:${getCat(t.catId).color}"></div>`).join('');
    const amtEl=dayTotal>0?`<div class="camt">${Math.round(dayTotal/10000)}만</div>`:'';
    cells+=`<div class="cal-cell${isToday?' today':''}${isSel?' sel':''}" onclick="selectDay('${key}')">
      ${dateEl}<div class="cdots">${dots}</div>${amtEl}
    </div>`;
  }
  const rem2=(7-(startDow+lastDay)%7)%7;
  for(let i=1;i<=rem2;i++) cells+=`<div class="cal-cell other"><div class="cdate">${i}</div></div>`;
  document.getElementById('calGrid').innerHTML=cells;
  renderDayDetail();
}

function selectDay(key){selectedDate=selectedDate===key?null:key;renderCal();}

function renderDayDetail(){
  const el=document.getElementById('dayDetail');
  if(!selectedDate){el.innerHTML='';return;}
  const dayTx=data.transactions.filter(t=>t.date===selectedDate);

      </div>`;
    }).join('');
    const total=dayTx.reduce((s,t)=>s+t.amount,0);
    html+=`<div style="text-align:right;font-size:12px;font-weight:700;color:var(--red);padding:7px 3px;">합계 ${fmt(total)}</div>`;
  }
  el.innerHTML=html;
}

// ── FOOD TAB ──
function renderFood(){

    const barColor=getBarColor(wp);

function renderEvent(){
  const year=new Date().getFullYear();
  document.getElementById('eventYearLabel').textContent=`${year}년 연간 누적`;
  const ye=data.events.filter(e=>e.date.startsWith(String(year)));
  const annual=ye.filter(e=>e.type==='annual').sort((a,b)=>b.date.localeCompare(a.date));
  const emergency=ye.filter(e=>e.type==='emergency').sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('annualTotal').textContent=annual.length?fmt(annual.reduce((s,e)=>s+e.amount,0)):'';
  document.getElementById('emergencyTotal').textContent=emergency.length?fmt(emergency.reduce((s,e)=>s+e.amount,0)):'';

  const renderItems=items=>items.length?items.map(e=>{
    const d=new Date(e.date);
    return `<div class="tx-item" style="margin-bottom:3px;">
      <div class="tx-body"><div class="tx-name">${e.memo||'내용 없음'}</div><div class="tx-cat">${d.getMonth()+1}월 ${d.getDate()}일</div></div>

  document.getElementById('annualList').innerHTML=renderItems(annual);

}

// ── BACKUP ──
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const n=new Date();
  a.href=url;a.download=`가계부_백업_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);showToast('백업 파일이 저장됐어요 📤');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!confirm('현재 데이터를 덮어쓸까요?'))return;
      data=d;if(!data.events)data.events=[];if(!data.weekBudgets)data.weekBudgets={};
      save();renderCal();renderSettings();showToast('데이터를 불러왔어요 📥');
    }catch{showToast('올바른 백업 파일이 아니에요');}
    e.target.value='';
  };r.readAsText(file);
}
function clearAll(){
  if(!confirm('모든 데이터를 초기화할까요?'))return;
  data={monthBudget:0,foodCatId:'c1',categories:[
    {id:'c1',name:'식비',color:'#2D6A4F',budget:0,subs:[]},
    {id:'c2',name:'카페',color:'#B8860B',budget:0,subs:[]},
    {id:'c3',name:'쇼핑',color:'#6C3483',budget:0,subs:[]},
    {id:'c4',name:'교통',color:'#1B4F72',budget:0,subs:[]},
    {id:'c5',name:'의료',color:'#C0392B',budget:0,subs:[]},
    {id:'c6',name:'교육',color:'#117A65',budget:0,subs:[]},
  ],transactions:[],events:[],weekBudgets:{}};
  save();renderCal();renderSettings();showToast('초기화됐어요');
}

// ── INIT ──
async function initApp(user) {
  currentUser = user;

  // Supabase에서 데이터 불러오기
  const remoteData = await loadFromSupabase();
  if (remoteData) {
    data = remoteData;
  } else {
    // 로컬 데이터가 있으면 서버로 마이그레이션
    const local = JSON.parse(localStorage.getItem('bn_data2') || 'null');
    if (local) {
      data = local;
      await saveToSupabase();
      showToast('기존 데이터를 서버에 저장했어요 ✅');
    }
  }

  if (!data.events) data.events = [];
  if (!data.weekBudgets) data.weekBudgets = {};
  if (data.foodCatId === undefined) data.foodCatId = 'c1';
  data.categories.forEach(c => { if (!c.subs) c.subs = []; });

  const lbl = `${curYear}년 ${curMonth+1}월`;
  ['monthLabel','monthLabel2','monthLabel3'].forEach(id => {
    const el = document.getElementById(id); if (el) el.textContent = lbl;
  });
  renderCal();
  document.getElementById('txModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
  document.getElementById('eventModal').addEventListener('click', function(e) { if(e.target===this) closeEventModal(); });

  showAppScreen();
}

// 인증 상태 감지 (자동 로그인 포함)
window.addEventListener('load', () => {
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      await initApp(session.user);
    } else {
      showLoginScreen();
    }
  });
});
</script>
</div> <!-- appContainer 닫기 -->
